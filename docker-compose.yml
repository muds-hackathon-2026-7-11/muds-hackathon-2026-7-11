services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-seminar_platform}
    ports:
      - "5442:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-seminar_platform}
    ports:
      - "8100:8000"
    volumes:
      - ./apps/api:/app/apps/api
      - /app/apps/api/.venv
    depends_on:
      db:
        condition: service_healthy

  slack-bot:
    build:
      context: .
      dockerfile: services/slack-bot/Dockerfile
      target: dev
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./services/slack-bot:/app/services/slack-bot
      - /app/services/slack-bot/.venv

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
    ports:
      - "3100:3000"
    volumes:
      - ./apps/web:/app/apps/web
      - /app/apps/web/node_modules
      - /app/node_modules
    depends_on:
      - api

volumes:
  db-data:
