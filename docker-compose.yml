services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-seminar_platform}
    ports:
      - "5442:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backup:
    image: prodrigestivill/postgres-backup-local:16
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-seminar_platform}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
    volumes:
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-seminar_platform}
    ports:
      - "8100:8000"
    volumes:
      - ./apps/api:/app/apps/api
      - /app/apps/api/.venv
    depends_on:
      db:
        condition: service_healthy

  slack-bot:
    build:
      context: .
      dockerfile: services/slack-bot/Dockerfile
      target: dev
    # SLACK_BOT_TOKEN/SLACK_APP_TOKEN未設定だと起動できない(意図的にexit 1する)。
    # unless-stoppedだと無限リトライしてログが埋まるので、数回で諦めるようにする。
    restart: on-failure:3
    env_file:
      - .env
    volumes:
      - ./services/slack-bot:/app/services/slack-bot
      - /app/services/slack-bot/.venv

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3100:3000"
    volumes:
      - ./apps/web:/app/apps/web
      - /app/apps/web/node_modules
      - /app/node_modules
    depends_on:
      - api

volumes:
  db-data:
